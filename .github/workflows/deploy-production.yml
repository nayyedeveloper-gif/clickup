# Deploy to production EC2 when pushing to `main`.
# Required repo secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY
# Example: DEPLOY_HOST=13.51.235.24  DEPLOY_USER=ubuntu  DEPLOY_PATH=/var/www/29-management

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'
            echo "==> $(pwd) ($(git rev-parse --short HEAD 2>/dev/null || echo '?'))"
            git fetch origin
            git checkout main
            git pull origin main
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader --no-interaction
            if command -v npm >/dev/null 2>&1; then
              npm ci
              npm run build
            else
              echo 'WARN: npm not found on server.' >&2
            fi
            php artisan migrate --force --no-interaction
            php artisan optimize:clear
            composer prod:optimize --no-interaction || (php artisan config:cache && php artisan event:cache)
            php artisan storage:link 2>/dev/null || true
            php artisan reverb:restart || true
            if command -v supervisorctl >/dev/null 2>&1; then
              supervisorctl restart reverb:* 2>/dev/null || true
              supervisorctl restart laravel-worker:* 2>/dev/null || true
            fi
            echo "==> Done ($(git rev-parse --short HEAD))"
