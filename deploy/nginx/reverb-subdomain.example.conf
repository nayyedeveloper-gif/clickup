# Dedicated WebSocket host → Reverb on localhost:8080
# DNS: A record reverb.example.com → server IP
# .env: REVERB_HOST=reverb.example.com REVERB_PORT=443 REVERB_SCHEME=https

server {
    listen 80;
    listen [::]:80;
    server_name reverb.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name reverb.example.com;

    ssl_certificate     /etc/letsencrypt/live/reverb.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reverb.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://127.0.0.1:8080;
    }
}
