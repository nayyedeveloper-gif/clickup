# HTTP only — bootstrap before you have a DNS name + Let's Encrypt certificate.
# Replace YOUR_PUBLIC_IP with the EC2 public IPv4 (e.g. 13.51.235.24).
# Replace APP_ROOT with your deploy path (e.g. /var/www/29-management/public).
#
# Install:
#   sudo cp deploy/nginx/laravel-http-ip.example.conf /etc/nginx/sites-available/29-management
#   sudo sed -i 's/YOUR_PUBLIC_IP/13.51.235.24/g' /etc/nginx/sites-available/29-management
#   sudo sed -i 's|APP_ROOT|/var/www/29-management/public|g' /etc/nginx/sites-available/29-management
#   sudo ln -sf /etc/nginx/sites-available/29-management /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Laravel .env for this phase:
#   APP_URL=http://YOUR_PUBLIC_IP
#   SESSION_SECURE_COOKIE=false

upstream php-fpm {
    server unix:/run/php/php8.3-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_PUBLIC_IP;

    root APP_ROOT;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
